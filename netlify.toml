[build]
  publish = "build"                # Adjust according to your build output
  command = "npm run build"        # Adjust according to your build script

[functions]
  directory = "netlify/functions"  # Directory for serverless functions

[dev]
  command = "node server.js"          # Command for local development
  port = 3030                      # Optional development port

[environment]
  NODE_ENV = "production"          # Example to set environment variables

[redirects]
  /*  /api/:splat  200              # Example redirect for functions
